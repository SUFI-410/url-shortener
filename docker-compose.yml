services:
  web:
    build: .
    env_file: .env.docker
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
      - staticfiles_volume:/app/staticfiles
    ports:
      - "8000:8000"

volumes:
  staticfiles_volume:
